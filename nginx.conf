events {
    # Número máximo de conexiones simultáneas por worker process.
    # 1024 es el default de nginx, más que suficiente para este proyecto.
    worker_connections 1024;
}

http {
    # Incluye el mapa de tipos MIME (extension → Content-Type).
    # Sin esto, nginx serviría .js como text/plain y el browser no lo ejecutaría.
    include       mime.types;

    # Content-Type por defecto si nginx no reconoce la extensión.
    default_type  application/octet-stream;

    # ==================================================================
    # Rendimiento
    # ==================================================================

    # Envía archivos usando sendfile() del kernel (copia cero).
    # Evita leer el archivo a memoria de usuario para mandarlo al socket.
    # Esencial para servir estáticos rápido.
    sendfile        on;

    # Tiempo máximo que nginx mantiene abierta una conexión HTTP keep-alive
    # antes de cerrarla. 65s es el default razonable.
    keepalive_timeout  65;

    # ==================================================================
    # Compresión Gzip
    # ==================================================================
    # Comprime HTML, JS, CSS, JSON antes de enviarlos al cliente.
    # Reduce el tamaño ~70% en texto. El browser descomprime automáticamente.

    gzip            on;                         # activar compresión

    # No comprimir respuestas menores a 1 KB (no vale la pena).
    gzip_min_length 1000;

    # Solo comprimir estos tipos MIME (texto). No imágenes ni fuentes.
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript image/svg+xml
                    application/font-woff2;

    # ==================================================================
    # Server block — configuración del sitio
    # ==================================================================
    server {
        # Puerto que nginx escucha DENTRO del container.
        # Docker mapea: host:8080 → container:80
        listen      80;

        # Directorio raíz donde están los archivos del sitio.
        # Se copian desde el stage builder en el Dockerfile.
        root        /usr/share/nginx/html;

        # Archivo que nginx sirve cuando se accede a un directorio.
        # Ej: GET /productos/ → sirve /productos/index.html
        index       index.html;

        # ==============================================================
        # Redirects relativos
        # ==============================================================
        # Por defecto nginx redirects absolutos: http://localhost/productos/
        # Eso PIERDE el puerto cuando Docker mapea 8080→80 porque nginx
        # solo conoce su propio puerto (80). Con absolute_redirect off,
        # nginx usa redirects relativos: Location: /productos/
        # El browser resuelve contra el origen actual y preserva el puerto.
        absolute_redirect off;

        # ==============================================================
        # Assets con hash — cache eterno
        # ==============================================================
        # Astro genera nombres como "client.CbHKJimV.js" — el hash cambia
        # cuando el contenido cambia. Podemos cachearlos para siempre
        # porque si el archivo cambia, la URL también cambia.

        # ~* = regex case-insensitive. Coincide con .js, .css, .png, etc.
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            # Cache por 1 año en el browser
            expires    1y;
            # "immutable" indica que el browser NO necesita revalidar
            # ni siquiera con request condicional (If-Modified-Since).
            add_header Cache-Control "public, immutable";
        }

        # ==============================================================
        # Fallback SPA / SSG
        # ==============================================================
        # Para cualquier ruta que no coincida con las reglas de arriba:
        #
        # try_files $uri $uri/ /index.html
        #
        # 1. $uri      → busca el archivo exacto (ej: /productos.html)
        # 2. $uri/     → busca el directorio y sirve index.html (ej: /productos/index.html)
        # 3. /index.html → si no existe nada, sirve la página principal
        #
        # Con Astro static, la mayoría de las rutas matchean en el paso 2
        # porque cada página es un directorio con index.html.
        # El paso 3 es un safety net para rutas client-side o errores 404.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
