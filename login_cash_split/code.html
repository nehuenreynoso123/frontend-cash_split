<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-4">

<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Ingresa tus credenciales para acceder a tu panel.</p>
</div>
<form action="#" class="space-y-stack_md" method="POST" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Correo Electrónico</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg font-body-base text-body-base focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="nombre@empresa.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Contraseña</label>
<a class="font-body-sm text-body-sm text-secondary hover:underline" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-white border border-outline-variant rounded-lg font-body-base text-body-base focus:ring-2 focus:ring-secondary/20 focus:border-secondary outline-none transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-2 py-1">
<input class="w-4 h-4 rounded border-outline-variant text-secondary focus:ring-secondary" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant" for="remember">Recordar mi sesión</label>
</div>
<!-- Primary Action -->
<button class="w-full bg-secondary text-on-secondary py-3.5 rounded-lg font-headline-md text-headline-md hover:bg-secondary-container hover:shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-stack_md" type="submit">
<span>Ingresar</span>
<span class="material-symbols-outlined text-[20px]" data-icon="login">login</span>
</button>

<!-- Social Login Divider -->

<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>

<div class="bg-secondary-container h-32 rounded-lg"></div>

<script>
        // Micro-interactions for login experience
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined')?.classList.add('text-secondary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined')?.classList.remove('text-secondary');
            });
        });

        // Toggle password visibility
        const togglePass = document.querySelector('button .material-symbols-outlined[data-icon="visibility"]')?.parentElement;
        if (togglePass) {
            togglePass.addEventListener('click', () => {
                const input = document.getElementById('password');
                const icon = togglePass.querySelector('.material-symbols-outlined');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility_off';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility';
                }
            });
        }
    </script>
